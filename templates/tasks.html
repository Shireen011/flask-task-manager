{% extends "base.html" %}

{% block title %}Tasks - Task Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-10 mx-auto">
        <h2>Task Management</h2>
        
        <!-- Add Task Form -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>Add New Task</h5>
            </div>
            <div class="card-body">
                <form id="task-form">
                    <div class="mb-3">
                        <label for="taskTitle" class="form-label">Task Title*</label>
                        <input type="text" class="form-control" id="taskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="taskDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Tasks</h5>
                <button id="refresh-tasks" class="btn btn-outline-secondary btn-sm">Refresh</button>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center d-none">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div id="no-tasks" class="text-center text-muted d-none">
                    <p>No tasks found. Create your first task above!</p>
                </div>
                <div id="tasks-container">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Task Modal -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-task-form">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label for="editTaskTitle" class="form-label">Task Title*</label>
                        <input type="text" class="form-control" id="editTaskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="editTaskDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="editTaskDescription" rows="3"></textarea>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="editTaskCompleted">
                        <label class="form-check-label" for="editTaskCompleted">
                            Mark as completed
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-task-changes">Save Changes</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
