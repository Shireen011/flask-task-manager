<!-- Professional TaskManager Pro App Icon SVG -->
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional blue background with padding -->
  <rect x="12" y="12" width="168" height="168" rx="36" fill="#2563eb"/>
  
  <!-- White clipboard/document -->
  <rect x="48" y="36" width="96" height="120" rx="12" fill="white"/>
  
  <!-- Header bar -->
  <rect x="48" y="36" width="96" height="24" rx="12" fill="#e2e8f0"/>
  
  <!-- Task items with checkmarks -->
  <g fill="#2563eb">
    <!-- Completed task checkmarks -->
    <circle cx="66" cy="84" r="9" fill="#059669"/>
    <path d="M60 84l6 6 12-12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <circle cx="66" cy="108" r="9" fill="#059669"/>
    <path d="M60 108l6 6 12-12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Pending task circle -->
    <circle cx="66" cy="132" r="9" fill="none" stroke="#94a3b8" stroke-width="4"/>
  </g>
  
  <!-- Task text lines -->
  <g fill="#64748b">
    <rect x="90" y="78" width="36" height="6" rx="3"/>
    <rect x="90" y="102" width="42" height="6" rx="3"/>
    <rect x="90" y="126" width="30" height="6" rx="3"/>
  </g>
</svg>