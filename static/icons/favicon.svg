<!-- Favicon SVG for Task Manager -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#007bff"/>
  
  <!-- Simplified clipboard -->
  <rect x="6" y="4" width="20" height="24" rx="2" fill="white"/>
  <rect x="8" y="6" width="16" height="20" rx="1" fill="#f8f9fa"/>
  
  <!-- Checkmarks -->
  <circle cx="12" cy="12" r="2" fill="#28a745"/>
  <path d="M10.5 12 L11.5 13 L13.5 11" stroke="white" stroke-width="1" fill="none"/>
  <rect x="16" y="11" width="6" height="1" fill="#28a745"/>
  
  <circle cx="12" cy="18" r="2" fill="#28a745"/>
  <path d="M10.5 18 L11.5 19 L13.5 17" stroke="white" stroke-width="1" fill="none"/>
  <rect x="16" y="17" width="5" height="1" fill="#28a745"/>
  
  <circle cx="12" cy="24" r="2" fill="#dee2e6"/>
  <rect x="16" y="23" width="4" height="1" fill="#6c757d"/>
</svg>