<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional blue background with padding -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#2563eb"/>
  
  <!-- White clipboard/document -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="white"/>
  
  <!-- Header bar -->
  <rect x="8" y="6" width="16" height="4" rx="2" fill="#e2e8f0"/>
  
  <!-- Task items with checkmarks -->
  <g fill="#2563eb">
    <!-- Completed task checkmarks -->
    <circle cx="11" cy="14" r="1.5" fill="#059669"/>
    <path d="M10 14l1 1 2-2" stroke="white" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    
    <circle cx="11" cy="18" r="1.5" fill="#059669"/>
    <path d="M10 18l1 1 2-2" stroke="white" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    
    <!-- Pending task circle -->
    <circle cx="11" cy="22" r="1.5" fill="none" stroke="#94a3b8" stroke-width="0.8"/>
  </g>
  
  <!-- Task text lines -->
  <g fill="#64748b">
    <rect x="15" y="13" width="6" height="1" rx="0.5"/>
    <rect x="15" y="17" width="7" height="1" rx="0.5"/>
    <rect x="15" y="21" width="5" height="1" rx="0.5"/>
  </g>
</svg>