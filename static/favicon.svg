<!-- Simple favicon that's more visible -->
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background circle -->
  <circle cx="8" cy="8" r="8" fill="#007bff"/>
  
  <!-- White clipboard -->
  <rect x="4" y="2" width="8" height="10" rx="1" fill="white"/>
  
  <!-- Green checkmarks -->
  <circle cx="6" cy="6" r="1" fill="#28a745"/>
  <circle cx="6" cy="9" r="1" fill="#28a745"/>
  
  <!-- Task lines -->
  <rect x="8" y="5.5" width="3" height="0.5" fill="#28a745"/>
  <rect x="8" y="8.5" width="2" height="0.5" fill="#28a745"/>
  <rect x="8" y="11" width="2.5" height="0.5" fill="#6c757d"/>
</svg>